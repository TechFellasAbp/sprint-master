<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/main.css">
    <title>Login</title>
</head>
<body>
    <main class="login">
        <!-- lado azul  -->
        <div class="welcome-banner">
            <img src="../assets/logo.png" width=20% height=20% alt="logo do site kk">
            <h1>Conhecimento Ágil <br> começa aqui</h1>
            <h4>Faça login na plataforma e garanta agilidade<br> em seus processos.</h4>
        </div>
        <!-- lado do formulario -->
        <div class="form-side">
            <div class="logo-space">
                <img src="../assets/logo.png" width=125px height=125px alt="Logo do Sprint Master">
            </div>
            <div class="form-container">
                <input class="form-input" placeholder="E-mail" id="email">
                <input class="form-input" placeholder="Senha" id="password">
            </div>
        </div>
    </main>
</body>
</html>
