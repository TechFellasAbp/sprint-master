<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resultado</title>
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="icon" href="assets/img/scrum-master-logo-circle.ico" />
  </head>
  <body>
    <header id="header"></header>
    <script>
      fetch("components/header.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("header").innerHTML = data;
        });
    </script>
    <!--Parte principal da página-->
    <main class="main-quiz-result">
      <div class="quiz-result-content">
        <img
          src="assets/img/resultado-questionario/zero-porcento-correto.png"
          alt="Porcentagem de acerto"
        />
        <div class="quiz-result-div-text">
          <p class="quiz-result-text">Você acertou 0% do nível.</p>
          <p class="quiz-result-text medium">Ops, não foi dessa vez...</p>
          <p class="quiz-result-text super-small">Ainda resta uma tentativa.</p>
          <a href="questionario.html" alt="Tentar Novamente">
            <button class="button-quiz-result">Tentar Novamente</button>
          </a>
        </div>
        <a href="modulos.html" class="quiz-result-text a">Voltar aos módulos</a>
      </div>
    </main>
  </body>
</html>
