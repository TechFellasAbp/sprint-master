<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="icon" href="../assets/img/scrum-master-logo-circle.ico">
</head>
<body>
    <header>
        <div class="menu">
            <!--Logo e escrita-->
            <div class="logo">
                <img class="scrum-master-logo" src="../assets/img/scrum-master-logo-circle.png" alt="Logo do site">
                <h3 class="texto-menu logo-texto">Sprint<br>Master</h4>
            </div>    
            <!--Usário e email genérico-->
             <div class="user">
                <div class="user-texto">
                    <p class="texto-menu nome-usuário">Nome Usuário</p>
                    <p class="texto-menu email">usuário@exemplo.com</p>
                </div>
            <a href="index.html"><img class="foto-de-perfil" src="../assets/img/user-icon.png" alt="Foto de perfil genérica"></a> 
             </div>
        </div>
       </header>
       <!--Parte principal da página-->
       <main class="main-quiz-result">
            <div class="quiz-result-content">
                <img src="../assets/img/resultado-questionario/zero-porcento-correto.png" alt="Porcentagem de acerto">
                <div class="quiz-result-div-text">
                    <p class="quiz-result-text">Você acertou 0% do nível.</p>
                    <p class="quiz-result-text medium">Ops, não foi dessa vez...</p>
                    <p class="quiz-result-text super-small">Ainda resta uma tentativa.</p>
                    <button class="button-quiz-result">
                        <a href="" alt="">Tentar Novamente</a>
                    </button>
                </div>
                <a href="" class="quiz-result-text a">Voltar aos módulos</a>
            </div>
       </main>
</body>
</html>
