<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <link rel="stylesheet" href="../assets/css/main.css">
    <title>Cadastro</title>
</head>
<body>
    <main class="login">
         <!-- lado do formulario -->
        <div class="form-side">
            <div class="logo-space">
                <img src="../assets/logo.png" width=125px height=125px alt="Logo do Sprint Master">
            </div>
            <div class="form-container">
                <h1>Seja bem vindo!</h1>
                <h5>Transforme conceitos em <b>resultados reais.</b></h5>
                <input class="form-input" placeholder="U+02709; Nome" id="name">
                <input class="form-input" placeholder="Email" id="email">
                <input class="form-input" placeholder="CPF" id="cpf">
                <input class="form-input" placeholder="Senha" id="password">
                <button type="submit" class="button-next">Próximo</button>
                <div class="form-extras">
                    <p class="style-paragrafo">Já possui login? <a href="#"> Esqueceu a senha?</a></p>
                </div>
            </div>
        </div>
        <!-- lado azul  -->
        <div class="welcome-banner">
            <img src="../assets/logo.png" width=175px height=175px alt="Logo do Sprint Master">
            <h1>Conhecimento Ágil <br> começa aqui</h1>
            <h4>Faça login na plataforma e garanta agilidade<br> em seus processos.</h4>
        </div>
    </main>
</body>
</html>
