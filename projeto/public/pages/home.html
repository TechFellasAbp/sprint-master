<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="icon" href="assets/img/scrum-master-logo-circle.ico" />
  </head>
  <body>
    <header id="header"></header>
    <script>
      fetch("components/header.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("header").innerHTML = data;
        });
    </script>
    <main>
      <section class="banner-container">
        <div class="banner-top">
          <h1 class="texto-menu banner-top-título">
            Conhecimento Ágil<br />Começa Aqui
          </h1>
          <p class="texto-menu banner-top-subtexto">
            Teste seus conhecimentos em Scrum <br />e conquiste seu certificado.
          </p>
          <a href="modulos.html" class="texto-button"
            ><button class="primeiro-button texto-button">
              Começar Avaliação
            </button></a
          >
        </div>
      </section>
      <!--Seção com os ícones (cards)-->
      <section class="banner-card">
        <div class="div-cards">
          <!--Card 1-->
          <div class="div-card">
            <div class="card-icone">
              <img
                class="icone"
                src="assets/img/questionario.png"
                alt="Ícone do questionário"
              />
            </div>
            <div class="card-texto">
              <h4>Faça o <br />questionário</h4>
            </div>
          </div>
          <!--Card 2-->
          <div class="div-card">
            <div class="card-icone">
              <img
                class="icone"
                src="assets/img/infinito.png"
                alt="Ícone do infinito"
              />
            </div>
            <div class="card-texto">
              <h4>Tempo <br />ilimitado</h4>
            </div>
          </div>
          <!--Card 3-->
          <div class="div-card">
            <div class="card-icone">
              <img
                class="icone"
                src="assets/img/alvo.png"
                alt="Ícone de alvo"
              />
            </div>
            <div class="card-texto">
              <h4>Atinja a <br />pontuação mínima</h4>
            </div>
          </div>
          <!--Card 4-->
          <div class="div-card">
            <div class="card-icone">
              <img
                class="icone"
                src="assets/img/certificado.png"
                alt="Ícone de certificado"
              />
            </div>
            <div class="card-texto">
              <h4>Receba seu <br />certificado</h4>
            </div>
          </div>
        </div>
      </section>
      <!--Fim da seção dos cards com os ícones-->
      <!--Início da seção do Scrum guide-->
      <section class="banner-container-2">
        <div class="logo-scrum-guide">
          <img src="assets/img/Scrum Logo.svg" alt="Logo Scrum Guide" />
          <p>
            Scrum <br />
            Guide
          </p>
        </div>
        <div class="texto-e-button-bottom">
          <p>
            Consulte o guia oficial e <br />esteja preparado para
            <br />conquistar seu certificado!
          </p>
          <div class="div-button-azul">
            <a
              href="https://scrumguides.org/download.html"
              class="link-button-azul"
              target="_blank"
            >
              <button class="button-azul">Aprenda já!</button>
            </a>
          </div>
        </div>
      </section>
      <!--Fim da seção do Scrum guide-->
    </main>
  </body>
</html>
